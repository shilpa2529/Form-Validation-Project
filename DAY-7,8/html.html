<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="./css.css">      
        <title>JAVASCRIPT</title>
    </head>
    <body>
        <div class="main">
            <img src="https://1000logos.net/wp-content/uploads/2021/05/GitHub-logo.png" class="image"/>
            <div class="container">
                <label for="nameelement" class="label">Username or emailaddress</label>
                <input type="text" id="nameelement"/>
            </div>
            <div class="container" style="text-align:center">
                <label for="passwordelement" class="label">Password</label>
                <input type="text" id="passwordelement" />
            </div>
            <div onclick="signinbtn()">
                <button class="btn" id="signin" >signin</button>
                <a href="https://education.github.com/git-cheat-sheet-education.pdf" target="_blank" id="signinanchor">"Download GitHub Cheat Sheet"</a>
            </div>
            <p>-------------------or---------------------</p>
            <div onclick="googlebtn()">
                 <button class="btn1" id="google" >Continue with Google</button>
                 <a href="www.google.com" target="_blank" id="googleanchor">Download Google</a>
            </div>
            <div onclick="applebtn()">
                 <button class="btn1" id="apple" >Continue with Apple</button>
                 <a href="www.apple.com" target="_blank" id="appleanchor">Download apple</a>
            </div>
            <p>New to GitHub?<span class="span">Create an account</span></p>
            <p class="span">signin with a passkey</p>
 

        </div>
        <script src="javascript.js"></script>
    </body>
</html>
