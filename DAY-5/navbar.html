<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap Grid Layout</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        .image-box {
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container py-4">

    <!-- Heading -->
    <h1 class="text-center mb-4">Bootstrap Grid Layout</h1>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light mb-4 rounded">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Navbar</a>

            <button class="navbar-toggler" type="button" 
                    data-bs-toggle="collapse" 
                    data-bs-target="#navbarNavDropdown">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNavDropdown">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Images</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Colours</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" 
                           data-bs-toggle="dropdown">
                            Dropdown
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#">Image1</a></li>
                            <li><a class="dropdown-item" href="#">Image2</a></li>
                            <li><a class="dropdown-item" href="#">Image3</a></li>
                            <li><a class="dropdown-item" href="#">Image4</a></li>
                            <li><a class="dropdown-item" href="#">Image5</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Grid Section -->
    <div class="row g-3">
        <div class="col-12 col-sm-6 col-md-4 col-lg-3 col-xl-2">
            <div class="image-box bg-danger">IMAGE 1</div>
        </div>

        <div class="col-12 col-sm-6 col-md-4 col-lg-3 col-xl-2">
            <div class="image-box bg-primary">IMAGE 2</div>
        </div>

        <div class="col-12 col-sm-6 col-md-4 col-lg-3 col-xl-2">
            <div class="image-box bg-warning text-dark">IMAGE 3</div>
        </div>

        <div class="col-12 col-sm-6 col-md-4 col-lg-3 col-xl-2">
            <div class="image-box bg-success">IMAGE 4</div>
        </div>

        <div class="col-12 col-sm-6 col-md-4 col-lg-3 col-xl-2">
            <div class="image-box bg-dark">IMAGE 5</div>
        </div>

        <div class="col-12 col-sm-6 col-md-4 col-lg-3 col-xl-2">
            <div class="image-box bg-info text-dark">IMAGE 6</div>
        </div>
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
